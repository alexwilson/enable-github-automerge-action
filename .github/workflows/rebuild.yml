# Always rebuild the distributable action, so that we can release from `main` at any point
# This doubles-up as a test, and also prevents tampering!

name: Rebuild
on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  rebuild:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
      - name: Install Dependencies
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      - name: Commit rebuilt dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force dist/
          if git diff --staged --quiet; then
            echo "dist/ already current; nothing to commit"
          else
            git commit -m "chore: rebuild action"
            git push
          fi
